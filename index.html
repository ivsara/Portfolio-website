<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate 3D Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial;
    color: white;
}

/* TEXT CONTENT */
.content {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 3em;
    color: #00f7ff;
    text-shadow: 0 0 20px #00f7ff;
}

/* CURSOR GLOW */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #00f7ff;
    pointer-events: none;
    box-shadow: 0 0 20px #00f7ff, 0 0 40px #00f7ff;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="content">
<h1>INDIRAVARMA E</h1>
<p>Interactive 3D Portfolio</p>
</div>

<div class="cursor" id="cursor"></div>

<script>
/* THREE.JS SCENE */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* PARTICLES */
const geometry = new THREE.BufferGeometry();
const vertices = [];

for (let i = 0; i < 2000; i++) {
    vertices.push(
        Math.random()*2000-1000,
        Math.random()*2000-1000,
        Math.random()*2000-1000
    );
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const material = new THREE.PointsMaterial({ color: 0x00f7ff });
const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z = 500;

/* MOUSE INTERACTION */
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX - innerWidth/2) * 0.002;
    mouseY = (e.clientY - innerHeight/2) * 0.002;
});

/* ANIMATION */
function animate() {
    requestAnimationFrame(animate);

    particles.rotation.y += 0.001 + mouseX;
    particles.rotation.x += 0.001 + mouseY;

    renderer.render(scene, camera);
}
animate();

/* CURSOR GLOW */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

/* SOUND EFFECT */
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

document.addEventListener("click", () => {
    clickSound.currentTime = 0;
    clickSound.play();
});

/* RESIZE */
window.addEventListener("resize", () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
